<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Responsive Social Buttons</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
    margin:0;
    padding:10px;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

/* Container */
.social-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:flex-start;
}

/* Button */
.social-btn{

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    flex:0 1 auto;

    min-width:170px;
    max-width:100%;

    padding:12px 18px;

    background:#fece02;
    color:#101010;

    text-decoration:none;

    border-radius:50px;

    font-weight:600;
    font-size:16px;

    transition:.3s;

    position:relative;
    overflow:hidden;

}

/* Hover */
.social-btn:hover{
    background:#f2c600;
    color:#101010;
    transform:translateY(-3px);
}

/* Shine */
.social-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:rgba(255,255,255,.35);
    transform:skewX(-25deg);
    transition:.6s;
}

.social-btn:hover::before{
    left:130%;
}

.social-btn i{
    font-size:20px;
}

/* Tablet */
@media (max-width:992px){

    .social-btn{
        min-width:150px;
        font-size:15px;
    }

}

/* HP */
@media (max-width:768px){

    .social-buttons{
        justify-content:center;
    }

    /* Sembunyikan semua tombol */
    .social-btn{
        display:none;
    }

    /* Tampilkan hanya tombol WhatsApp */
    .social-btn:first-child{
        display:flex;
        width:100%;
        max-width:320px;
        min-width:unset;
        padding:12px;
        justify-content:center;
        font-size:15px;
    }

}

</style>

</head>
<body>

<div class="container-fluid p-0">

<div class="social-buttons">

<a class="social-btn"
href="https://wa.me/6289675223353"
target="_blank">
<i class="fa-brands fa-whatsapp"></i>
<span>Chat WhatsApp</span>
</a>

<a class="social-btn"
href="https://instagram.com"
target="_blank">
<i class="fa-brands fa-instagram"></i>
<span>Instagram</span>
</a>

<a class="social-btn"
href="https://github.com"
target="_blank">
<i class="fa-brands fa-github"></i>
<span>GitHub</span>
</a>

</div>

</div>

</body>
</html>
