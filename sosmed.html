<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    background:transparent;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    padding:8px;
}

/* ==========================
   SOCIAL GRID
========================== */

.social-grid{
    display:grid;
    gap:12px;
}

/* Desktop & Laptop
   2 Baris x 6 Tombol */
@media (min-width:992px){
    .social-grid{
        grid-template-columns:repeat(6,1fr);
    }
}

/* Tablet */
@media (min-width:768px) and (max-width:991px){
    .social-grid{
        grid-template-columns:repeat(3,1fr);
    }
}

/* HP */
@media (min-width:481px) and (max-width:767px){
    .social-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

/* HP Kecil */
@media (max-width:480px){
    .social-grid{
        grid-template-columns:1fr;
    }
}

/* ==========================
   BUTTON
========================== */

.social-btn{

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    width:100%;
    min-height:52px;

    padding:12px 15px;

    background:#fece02;
    color:#101010;

    text-decoration:none;

    border-radius:40px;

    font-weight:600;
    font-size:15px;

    white-space:nowrap;

    position:relative;
    overflow:hidden;

    transition:.3s;

}

.social-btn:hover{

    background:#f0c400;
    color:#101010;

    transform:translateY(-3px);

}

.social-btn i{
    font-size:18px;
}

/* Shine Effect */

.social-btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:rgba(255,255,255,.35);

    transform:skewX(-25deg);

    transition:.6s;

}

.social-btn:hover::before{

    left:130%;

}

@media (max-width:768px){

    .social-btn{
        font-size:14px;
    }

}

</style>

</head>

<script>

/* Auto Height Google Sites */

function sendHeight(){

    const h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
    );

    parent.postMessage({
        type:"embed-size",
        height:h
    },"*");

}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

new ResizeObserver(sendHeight).observe(document.body);

</script>
