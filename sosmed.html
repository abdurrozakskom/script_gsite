<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Social Links</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
background:transparent;
overflow-x:hidden;
font-family:Arial,Helvetica,sans-serif;
}

body{
padding:8px;
}

/* Grid */

.social-grid{

display:grid;
gap:12px;

grid-template-columns:repeat(auto-fit,minmax(160px,1fr));

}

/* Desktop */

@media(min-width:1400px){

.social-grid{

grid-template-columns:repeat(10,1fr);

}

}

/* Laptop */

@media(max-width:1399px){

.social-grid{

grid-template-columns:repeat(auto-fit,minmax(170px,1fr));

}

}

/* Tablet */

@media(max-width:768px){

.social-grid{

grid-template-columns:repeat(2,1fr);

}

}

/* HP */

@media(max-width:480px){

.social-grid{

grid-template-columns:1fr;

}

}

/* Button */

.social-btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

padding:12px;

border-radius:40px;

background:#fece02;

color:#101010;

text-decoration:none;

font-weight:600;

transition:.3s;

position:relative;

overflow:hidden;

}

.social-btn:hover{

background:#f0c400;

transform:translateY(-3px);

color:#101010;

}

.social-btn i{

font-size:20px;

}

.social-btn::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:60%;
height:100%;

background:rgba(255,255,255,.35);

transform:skewX(-25deg);

transition:.6s;

}

.social-btn:hover::before{

left:130%;

}

@media(max-width:768px){

.social-btn{

font-size:14px;

}

}

</style>

</head>

<body>

<div class="container-fluid">

<div class="social-grid">

<a class="social-btn" href="https://wa.me/6289675223353" target="_blank"><i class="fa-brands fa-whatsapp"></i>WhatsApp</a>

<a class="social-btn" href="https://instagram.com/abdurrozak.skom" target="_blank"><i class="fa-brands fa-instagram"></i>Instagram</a>

<a class="social-btn" href="https://threads.com/@abdurrozak.skom" target="_blank"><i class="fa-brands fa-threads"></i>Threads</a>

<a class="social-btn" href="https://facebook.com/abdur.rozak.skom" target="_blank"><i class="fa-brands fa-facebook-f"></i>Facebook</a>

<a class="social-btn" href="https://tiktok.com/@abdurrozak.skom" target="_blank"><i class="fa-brands fa-tiktok"></i>TikTok</a>

<a class="social-btn" href="https://id.pinterest.com/jacktersakiti/" target="_blank"><i class="fa-brands fa-pinterest-p"></i>Pinterest</a>

<a class="social-btn" href="https://github.com/abdurrozakskom" target="_blank"><i class="fa-brands fa-github"></i>GitHub</a>

<a class="social-btn" href="https://t.me/abdurrozakskom" target="_blank"><i class="fa-brands fa-telegram"></i>Telegram</a>

<a class="social-btn" href="mailto:abdurrozak.skom@gmail.com"><i class="fa-solid fa-envelope"></i>Email</a>

<a class="social-btn" href="https://abdurrozak.my.id" target="_blank"><i class="fa-solid fa-globe"></i>Website</a>

</div>

</div>

<script>

/* Auto Height Google Sites */

function sendHeight(){

const h=Math.max(
document.body.scrollHeight,
document.documentElement.scrollHeight
);

parent.postMessage({
type:"embed-size",
height:h
},"*");

}

window.addEventListener("load",sendHeight);

window.addEventListener("resize",sendHeight);

new ResizeObserver(sendHeight).observe(document.body);

</script>

</body>
</html>
